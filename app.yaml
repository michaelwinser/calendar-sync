name: calendar-sync
port: 4004

store:
  type: sqlite
  path: data/app.db

environments:
  local:
    url: http://localhost:4004
    auth:
      client_id: ${secret:google-client-id}
      client_secret: ${secret:google-client-secret}
      extra_scopes:
        - https://www.googleapis.com/auth/calendar

  production:
    url: https://calendar-sync.run.app
    store:
      type: firestore
      gcp_project: xwind-calendar-sync
    auth:
      client_id: ${secret:google-client-id}
      client_secret: ${secret:google-client-secret}
      extra_scopes:
        - https://www.googleapis.com/auth/calendar
